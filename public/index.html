<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eco-Track</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>&#127807;Eco-Track</h1>
    <p>Hitung jejak karbon harianmu!</p>
  </header>

 
  <main>
    <!--Tugas 2-->
    <section class="card">
      <h2>Input Aktivitas</h2>
      <!--Jenis Transportasi-->
        <div class="input-group">
          <label for="jarak">Jarak Tempuh (km)</label>
          <input type="number" id="jarak" placeholder="Contoh: 10" min="0" required>
        </div>

        <div class="input-group">
          <label for="kendaraan">Jenis Kendaraan</label>
          <select id="kendaraan">
          <option value="motor">Motor</option>
          <option value="mobil">Mobil</option>
          </select>
        </div>

      <!--Energi-->
        <div class="input-group">
          <label for="durasi_ac">Durasi AC (jam)</label>
          <input type="number" id="durasi_ac" placeholder="Contoh: 1" min="0" required>
        </div>

        <div class="input-group">
          <label for="durasi_laptop">Durasi Laptop (jam)</label>
          <input type="number" id="durasi_laptop" placeholder="Contoh: 1" min="0" required>
        </div>

      <!--Button-->
        <div class="button-group">
          <button id="btn-hitung">Hitung</button>
          <button id="btn-reset">Reset</button>
        </div>
    </section>

    <!--Tugas 3-->
    <section class="card">
      <h2>Hasil Perhitungan</h2>
        <div id="hasil">
          <p class="placeholder">Hasil akan muncul di sini setelah Anda klik <strong>Hitung</strong>.</p>
        </div>
    </section>

    <!--Tugas A2-->
    <section class="card" id="card-tips">
      <h2>Action Plan</h2>
      <p class="tips-subtitle"><em>Centang tips yang sudah kamu lakukan hari ini!</em></p>

    <ul class="tips-list">
      <li>
        <label class="tips-item">
          <input type="checkbox" class="tips-check">
          <span style="text-align: justify;">&#128690;Naik sepeda atau jalan kaki untuk jarak dekat</span>
        </label>
      </li>
      <li>
        <label class="tips-item">
          <input type="checkbox" class="tips-check">
          <span style="text-align: justify;">❄️Atur suhu AC di 24-26°C dan batasi penggunaannya</span>
        </label>
      </li>
      <li>
        <label class="tips-item">
          <input type="checkbox" class="tips-check">
          <span style="text-align: justify;">&#128268;Cabut charger dan perangkat elektronik saat tidak dipakai</span>
        </label>
      </li>
      <li>
        <label class="tips-item">
          <input type="checkbox" class="tips-check">
          <span style="text-align: justify;">&#128652;Gunakan transportasi umum jika memungkinkan</span>
        </label>
      </li>
      <li>
        <label class="tips-item">
          <input type="checkbox" class="tips-check">
          <span style="text-align: justify;">&#128161;Matikan lampu saat meninggalkan ruangan</span>
        </label>
      </li>
    </ul>

  <div id="pesan-motivasi" class="pesan-motivasi"></div>
</section>
  </main>

  <script src="main.js"></script>
</body>
</html>
